<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PM MVP Backend Hello</title>
    <style>
      :root {
        --accent-yellow: #ecad0a;
        --primary-blue: #209dd7;
        --secondary-purple: #753991;
        --navy-dark: #032147;
        --gray-text: #888888;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f6f9fc;
        color: var(--navy-dark);
      }

      main {
        max-width: 760px;
        margin: 64px auto;
        padding: 0 20px;
      }

      .panel {
        background: #fff;
        border: 1px solid rgba(3, 33, 71, 0.1);
        border-radius: 16px;
        padding: 24px;
      }

      h1 {
        margin: 0;
        color: var(--navy-dark);
      }

      p {
        color: var(--gray-text);
      }

      pre {
        margin: 0;
        background: rgba(32, 157, 215, 0.08);
        color: var(--navy-dark);
        border-radius: 10px;
        padding: 12px;
        overflow: auto;
      }

      .status {
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Hello from FastAPI</h1>
        <p>
          This confirms static content is being served from the backend
          container.
        </p>
        <div class="status">
          <h2>API Health</h2>
          <pre id="health-result">Loading...</pre>
        </div>
      </section>
    </main>
    <script>
      async function loadHealth() {
        const target = document.getElementById("health-result");
        try {
          const response = await fetch("/api/health");
          const data = await response.json();
          target.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          target.textContent = `Request failed: ${error}`;
        }
      }
      loadHealth();
    </script>
  </body>
</html>
